<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FRKN App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0b0d12;
      --card: #121621;
      --text: #e6e8ef;
      --muted: #9aa1b2;
      --accent: #5b7cfa;
      --accent-2: #22d3ee;
      --border: #1f2433;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      padding-bottom: 40px;
    }

    #sub-id {
      user-select: all;
      word-break: break-all;
      font-family: monospace;
      opacity: 0.8;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    /* Hero Stats */
    .hero-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .stat {
      background: rgba(30, 41, 59, 0.4);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .stat span {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
    }

    .stat b {
      font-size: 1.8rem;
      color: var(--accent-2);
      display: block;
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
    }

    .tab.active {
      background: var(--border);
      color: #fff;
      border-color: var(--accent);
    }

    /* Proxy Items */
    .proxy-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .proxy-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.2s;
    }

    .proxy-item:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.08);
    }

    .proxy-label {
      font-size: 14px;
      font-weight: 500;
    }

    .proxy-action {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* QR Codes */
    .qr-row {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      margin-top: 12px;
      padding-bottom: 8px;
    }

    .qr-item {
      min-width: 120px;
      text-align: center;
      background: #fff;
      padding: 8px;
      border-radius: 12px;
    }

    .qr-item span {
      font-size: 9px;
      color: #000;
      font-weight: 800;
      display: block;
      margin-bottom: 4px;
    }

    canvas {
      width: 100% !important;
      height: auto !important;
    }

    /* UI Elements */
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #000;
      color: #fff;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    .btn-main {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .status-active {
      color: #10b981;
    }

    .status-expired {
      color: #ef4444;
    }

    .hidden {
      display: none;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div id="main-app">
    <div class="card">
      <h2
        style="margin:0; font-size: 1.2rem; background: linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Рилзопровод: Подписка
      </h2>
      <div class="hero-stats">
        <div class="stat"><span>Дней</span><b id="days">...</b></div>
        <div class="stat"><span>Статус</span><b id="status-text" style="font-size: 1rem; margin-top: 12px;">...</b>
        </div>
      </div>
      <div class="muted">ID: <span id="sub-id" style="text-decoration: underline;">...</span></div>
    </div>

    <div id="env-selector" class="card"
      style="padding: 10px; margin-top: 10px; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;">
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('xray')">Xray</button>
      <button class="tab" onclick="switchTab('h2')">Hysteria2</button>
    </div>

    <div id="content-xray" class="card">
      <div id="xray-list" class="proxy-list"></div>
      <div id="xray-qr" class="qr-row"></div>
    </div>

    <div id="content-h2" class="card hidden">
      <div id="h2-list" class="proxy-list"></div>
      <div id="h2-qr" class="qr-row"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0; font-size: 1rem;">⚡ Докинуть дней</h3>
      <input type="text" id="keyInput" placeholder="Введите ключ">
      <button class="btn-main" onclick="activateKey()">Активировать</button>
    </div>
  </div>

  <div id="error-screen" class="card hidden" style="text-align: center;">
    <h2 style="color: #ef4444;">Подписка не найдена</h2>
    <p class="muted">Похоже, срок действия истек или ID не верен.</p>
    <button class="btn-main" onclick="tg.close()">Вернуться в бот</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname);
    const API_BASE = isLocal ? "http://localhost:5005" : "https://api.frkn.org";
    const AUTH_BASE = API_BASE; // Убедись, что AUTH_BASE определен
    const params = new URLSearchParams(window.location.search);
    const subId = getSubId();
    let currentEnv = params.get('env') || 'dev';

    const ENV_NAMES = {
      'dev': '⌯✈︎ Основа',
      'wl': '🐘 БС -Белые слоны',
      'ru': '🇷🇺 Обратный',

    };

    function getSubId() {
      const params = new URLSearchParams(window.location.search);

      return (
        params.get("id") ||
        localStorage.getItem("frkn_sub_id") ||
        tg.initDataUnsafe?.start_param ||   // если ты передаешь через deep link
        null
      );
    }

    async function load() {
      if (subId) {
        localStorage.setItem("frkn_sub_id", subId);
      }
      if (!subId) return showState('error');

      try {
        const res = await fetch(`${API_BASE}/subscription/${subId}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        render(data);
      } catch (e) {
        showState('error');
      }
    }

    function render(data) {
      document.getElementById('sub-id').innerText = data.id;
      document.getElementById('days').innerText = data.days;

      const statusEl = document.getElementById('status-text');
      statusEl.innerText = data.days > 0 ? "АКТИВНА" : "ИСТЕКЛА";
      statusEl.className = data.days > 0 ? "status-active" : "status-expired";

      const envContainer = document.getElementById('env-selector');
      envContainer.innerHTML = '';

      if (data.locations && data.locations.length > 0) {
        data.locations.forEach(loc => {
          const btn = document.createElement('button');
          btn.className = `tab ${loc.env === currentEnv ? 'active' : ''}`;
          btn.style.fontSize = '0.8rem';
          btn.style.padding = '5px 12px';
          btn.innerText = ENV_NAMES[loc.env] || loc.env.toUpperCase();

          btn.onclick = () => {
            currentEnv = loc.env;
            render(data);
            tg.HapticFeedback.selectionChanged();
          };
          envContainer.appendChild(btn);
        });
      }

      const activeLoc = data.locations?.find(l => l.env === currentEnv) || data.locations?.[0];

      document.getElementById('xray-list').innerHTML = '';
      document.getElementById('xray-qr').innerHTML = '';
      document.getElementById('h2-list').innerHTML = '';
      document.getElementById('h2-qr').innerHTML = '';

      if (activeLoc) {
        if (activeLoc.has_xray) {
          setupProto('xray', data.id, activeLoc.env, ['TXT', 'Base64', 'Clash']);
        } else {
          document.getElementById('xray-list').innerHTML = '<p class="muted">Недоступно в этом регионе</p>';
        }

        if (activeLoc.has_hysteria) {
          setupProto('h2', data.id, activeLoc.env, ['TXT', 'Base64']);
        } else {
          document.getElementById('h2-list').innerHTML = '<p class="muted">Недоступно в этом регионе</p>';
        }
      }
    }

    function setupProto(proto, id, env, formats) {
      const listContainer = document.getElementById(`${proto}-list`);
      const qrContainer = document.getElementById(`${proto}-qr`);

      formats.forEach(fmt => {
        const url = `${API_BASE}/sub?id=${id}&env=${env}&proto=${proto === 'xray' ? 'Xray' : 'Hysteria2'}&format=${fmt.toLowerCase()}`;

        const item = document.createElement('div');
        item.className = 'proxy-item';
        item.innerHTML = `<div class="proxy-label">${fmt}</div><div class="proxy-action">Копировать</div>`;
        item.onclick = () => copy(url, "Ссылка скопирована");
        listContainer.appendChild(item);

        const qrBox = document.createElement('div');
        qrBox.className = 'qr-item';
        qrBox.innerHTML = `<span>${fmt}</span><canvas id="qr-${proto}-${fmt}-${env}"></canvas>`;
        qrContainer.appendChild(qrBox);

        setTimeout(() => {
          const canvas = document.getElementById(`qr-${proto}-${fmt}-${env}`);
          if (canvas) QRCode.toCanvas(canvas, url, {width: 120, margin: 1});
        }, 50);
      });
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      el.classList.add('active');

      document.getElementById('content-xray').classList.toggle('hidden', tab !== 'xray');
      document.getElementById('content-h2').classList.toggle('hidden', tab !== 'h2');
    }

    function copy(text, message = "Скопировано") {
      navigator.clipboard.writeText(text);
      tg.HapticFeedback.notificationOccurred('success');
      tg.showAlert(message);
    }

    async function activateKey() {
      const code = document.getElementById('keyInput').value;
      const subId = getSubId();

      if (!code) return;

      if (!subId) {
        tg.showAlert("Нет subscription ID");
        return;
      }

      tg.MainButton.showProgress();

      try {
        const res = await fetch(`${AUTH_BASE}/activate`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({code, subscription_id: subId})
        });

        if (!res.ok) {
          tg.HapticFeedback.notificationOccurred('error');
          tg.showAlert("Ошибка ключа");
          return;
        }

        tg.HapticFeedback.notificationOccurred('success');
        location.reload();

      } catch {
        tg.HapticFeedback.notificationOccurred('error');
        tg.showAlert("Ошибка сети");
      }

      tg.MainButton.hideProgress();
    }

    function showState(s) {
      document.getElementById('main-app').classList.toggle('hidden', s === 'error');
      document.getElementById('error-screen').classList.toggle('hidden', s !== 'error');
    }

    load();
  </script>
</body>

</html>
