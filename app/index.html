<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FRKN App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0b0d12;
      --card: #121621;
      --text: #e6e8ef;
      --muted: #9aa1b2;
      --accent: #5b7cfa;
      --accent-2: #22d3ee;
      --border: #1f2433;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      padding-bottom: 40px;
    }

    #sub-id {
      user-select: all;
      word-break: break-all;
      font-family: monospace;
      opacity: 0.8;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    /* Hero Stats */
    .hero-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .stat {
      background: rgba(30, 41, 59, 0.4);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .stat span {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
    }

    .stat b {
      font-size: 1.8rem;
      color: var(--accent-2);
      display: block;
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
    }

    .tab.active {
      background: var(--border);
      color: #fff;
      border-color: var(--accent);
    }

    .proxy-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .proxy-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.2s;
    }

    .proxy-item:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.08);
    }

    .proxy-label {
      font-size: 14px;
      font-weight: 500;
    }

    .proxy-action {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* QR Codes */
    .qr-row {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      margin-top: 12px;
      padding-bottom: 8px;
      justify-content: center;
    }

    .qr-item {
      min-width: 120px;
      text-align: center;
      background: #fff;
      padding: 8px;
      border-radius: 12px;
    }

    .qr-item span {
      font-size: 9px;
      color: #000;
      font-weight: 800;
      display: block;
      margin-bottom: 4px;
    }

    canvas {
      width: 100% !important;
      height: auto !important;
    }

    /* UI Elements */
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #000;
      color: #fff;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    .btn-main {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .status-active {
      color: #10b981 !important;
      background: rgba(16, 185, 129, 0.15) !important;
      padding: 4px 12px !important;
      border-radius: 8px;
      width: fit-content;
      display: inline-flex !important;
      justify-content: center;
      font-weight: 600;
    }

    .status-expired {
      color: #ef4444 !important;
      background: rgba(239, 68, 68, 0.15) !important;
      padding: 4px 12px !important;
      border-radius: 8px;
      width: fit-content;
      display: inline-flex !important;
      justify-content: center;
      font-weight: 600;
    }

    .status-warning {
      color: #ffbd4d !important;
      background: rgba(255, 189, 77, 0.15) !important;
      padding: 4px 12px !important;
      border-radius: 8px;
      width: fit-content;
      display: inline-flex !important;
      justify-content: center;
      font-weight: 600;
    }

    /* Более яркие цвета */
    .days-green {
      color: #10b981 !important;
      text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
    }

    .days-red {
      color: #ff4444 !important;
      text-shadow: 0 0 20px rgba(255, 68, 68, 0.6);
      animation: pulse 1s infinite;
    }

    .days-warning {
      color: #fbbf24 !important;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }

      100% {
        opacity: 1;
      }
    }

    .hidden {
      display: none;
    }

    .apps {
      margin-top: 10px;
      color: #10b981
    }

    .center {
      text-align: center;
    }


    .text-link {
      color: #10b981 !important;
      text-decoration: underline;
      font-weight: 500;
    }

    .text-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .stat b {
      transition: all 0.3s ease;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 12px;
      width: fit-content;
      flex-direction: column;

    }


    #logo-container img {
      box-shadow:
        0 0 10px rgba(0, 150, 255, 0.4),
        0 0 20px rgba(0, 100, 255, 0.2);

      border: 1px solid rgba(255, 255, 255, 0.1);

    }

    .logo img {

      width: 50px;
      height: 34px;

      border-radius: 12%;
      object-fit: contain;

      background-color: #ffffff;

      box-shadow: 0 0 10px rgba(91, 124, 250, 0.2);
      transition: box-shadow 0.3s ease;
    }

    .logo img:hover {
      filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.8));
      transform: scale(1.05);
    }

    .logo:hover img {
      /* Усиливаем свечение квадрата */
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
    }

    .logo a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .logo:hover {
      transform: scale(1.01);
      /* Увеличиваем всё вместе */
    }

    .logo:hover a {
      color: #fff;
      /* Добавляем неоновое свечение буквам */
      text-shadow:
        0 0 8px rgba(91, 124, 250, 0.8),
        0 0 15px rgba(34, 211, 238, 0.4);
    }
  </style>
</head>

<body>



  <div id="main-app">
    <div class="card">
      <div class="logo">
        <a href="/"><img src="/Images/logo.png" alt="FRKN Logo" />FRKN</a>
      </div>
      <h2
        style="margin:0; font-size: 1.2rem; background: linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Рилзопровод: Подписка
      </h2>
      <div class="hero-stats">
        <div class="stat"><span>Дней</span><b id="days">...</b></div>
        <div class="stat"><span>Статус</span><b id="status-text">...</b>
        </div>
      </div>
      <div class="muted">ID: <span id="sub-id" style="text-decoration: underline;">...</span></div>
    </div>

    <div id="env-selector" class="card"
      style="padding: 10px; margin-top: 10px; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;">
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('xray', this)">Xray</button>
      <button class="tab" onclick="switchTab('h2', this)">Hysteria2</button>
      <button class="tab" onclick="switchTab('wg', this)">WireGuard</button>
      <button class="tab" onclick="switchTab('mtproto', this)">MTProto</button>
    </div>

    <div id="content-xray" class="card">
      <div id="xray-list" class="proxy-list"></div>
      <div id="xray-qr" class="qr-row"></div>
      <div class="apps center"><a href="/setup" class="text-link">Как настроить?</a></div>
    </div>

    <div id="content-h2" class="card hidden">
      <div id="h2-list" class="proxy-list"></div>
      <div id="h2-qr" class="qr-row"></div>
      <div class="apps center"><a href="/setup" class="text-link">Как настроить?</a></div>
    </div>

    <div id="content-wg" class="card hidden">
      <div id="wg-list" class="proxy-list"></div>
      <div id="wg-qr" class="qr-row"></div>
      <div class="apps center"><a href="/setup" class="text-link">Как настроить?</a></div>
    </div>

    <div id="content-mtproto" class="card hidden">
      <div id="mtproto-list" class="proxy-list"></div>
      <div id="mtproto-qr" class="qr-row"></div>
      <div class="apps center"><a href="/setup" class="text-link">Как настроить?</a></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0; font-size: 1rem;">⚡ Докинуть дней</h3>
      <input type="text" id="keyInput" placeholder="Введите ключ">
      <button class="btn-main" onclick="activateKey()">Активировать</button>
    </div>


  </div>

  <div id="error-screen" class="card hidden" style="text-align: center;">
    <h2 style="color: #ef4444;">Подписка не найдена</h2>
    <p class="muted">Похоже, срок действия истек или ID не верен.</p>
    <button class="btn-main" onclick="tg.close()">Вернуться в бот</button>
  </div>



  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname);
    const API_BASE = isLocal ? "http://localhost:5005" : "https://api.frkn.org";
    const AUTH_BASE = isLocal ? "http://localhost:3005" : "https://api.frkn.org";
    const params = new URLSearchParams(window.location.search);
    const subId = getSubId();
    let currentEnv = params.get('env') || 'dev';

    const ENV_NAMES = {
      'dev': '⌯✈︎ Основа',
      'wl': '🐘 БС -Белые слоны',
      'ru': '🇷🇺 Обратный',

    };

    function getSubId() {
      const params = new URLSearchParams(window.location.search);

      const urlId = params.get("id");
      const stored = localStorage.getItem("frkn_sub_id");

      const id = urlId || stored;

      if (urlId) {
        localStorage.setItem("frkn_sub_id", urlId);
      }

      return id;
    }

    async function load() {
      if (subId) {
        localStorage.setItem("frkn_sub_id", subId);
      }
      if (!subId) return showState('error');

      try {
        const res = await fetch(`${API_BASE}/subscription/${subId}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        render(data);
      } catch (e) {
        showState('error');
      }
    }

    function renderXray(id, env, has) {
      const container = document.getElementById('xray-content');
      if (!has) {
        container.innerHTML = `<div class="small">Xray недоступен в этом регионе</div>`;
        return;
      }

      const subUrlTxt = `${API_BASE}/sub?id=${id}&env=${env}&proto=Xray&format=txt`;
      const subUrlPlain = `${API_BASE}/sub?id=${id}&env=${env}&proto=Xray&format=plain`;
      const subUrlClash = `${API_BASE}/sub?id=${id}&env=${env}&proto=Xray&format=clash`;

      container.innerHTML = `
          <ul class="proxy-list">
            <li class="proxy-item" onclick="copyText('${subUrlTxt}', 'Ссылка скопирована!')">
                 <div class="proxy-label black">
                 <img src="/Images/xray.svg" style="width: 16px; height: 16px;" class="black">&nbsp;&nbsp;&nbsp;TXT (Универсальная)</div>
                 <div class="proxy-action">Копировать</div></li>
            <li class="proxy-item" onclick="copyText('${subUrlPlain}','Ссылка скопирована!')">
            <div class="proxy-label black ">
            <img src="/Images/xray.svg" style="width: 16px; height: 16px;" class="black">&nbsp;&nbsp;&nbsp;Base64</div>
            <div class="proxy-action">Копировать</div></li>

            <li class="proxy-item" onclick="copyText('${subUrlClash}','Ссылка скопирована!')"><div class="proxy-label">
            <img src="/Images/clash.png" style="width: 16px; height: 16px;">&nbsp;&nbsp;&nbsp;Clash</div>
            <div class="proxy-action">Копировать</div></li>
          </ul>
          <div class="qr-row">
            <div class="qr-item"><span>TXT (Универсальная) </span><canvas id="qr-xray-txt"></canvas></div>
            <div class="qr-item"><span>B64</span><canvas id="qr-xray-plain"></canvas></div>
            <div class="qr-item"><span>Clash</span><canvas id="qr-xray-clash"></canvas></div>
          </div>
          <div class="apps center"><a href="/setup">Как настроить?</a></div>
        `;

      QRCode.toCanvas(document.getElementById("qr-xray-txt"), subUrlTxt, {width: 140});
      QRCode.toCanvas(document.getElementById("qr-xray-plain"), subUrlPlain, {width: 140});
      QRCode.toCanvas(document.getElementById("qr-xray-clash"), subUrlClash, {width: 140});
    }

    function renderH2(id, env, has) {
      const container = document.getElementById('hysteria-content');
      if (!has) {
        container.innerHTML = `<div class="small">Hysteria2 недоступна в этом регионе</div>`;
        return;
      }

      const subUrlTxt = `${API_BASE}/sub?id=${id}&env=${env}&proto=Hysteria2&format=txt`;
      const subUrlPlain = `${API_BASE}/sub?id=${id}&env=${env}&proto=Hysteria2&format=plain`;

      container.innerHTML = `
          <ul class="proxy-list gray">
          <img src="/Images/h2.svg" >
            <li class="proxy-item" onclick="copyText('${subUrlTxt}','Ссылка скопирована!')"><div class="proxy-label">  TXT (Универсальная)</div><div class="proxy-action">Копировать</div></li>
            <li class="proxy-item" onclick="copyText('${subUrlPlain}','Ссылка скопирована!')"><div class="proxy-label">Base64</div><div class="proxy-action">Копировать</div></li>
          </ul>
          <div class="qr-row">
            <div class="qr-item"><span>TXT (Универсальная)</span><canvas id="qr-h2-txt"></canvas></div>
            <div class="qr-item"><span>Base64</span><canvas id="qr-h2-plain"></canvas></div>
          </div>
          <div class="apps center"><a href="/setup">Как настроить?</a></div>
        `;

      QRCode.toCanvas(document.getElementById("qr-h2-txt"), subUrlTxt, {width: 140});
      QRCode.toCanvas(document.getElementById("qr-h2-plain"), subUrlPlain, {width: 140});
    }

    function renderMtproto(id, env, has) {
      const container = document.getElementById('mtproto-content');

      if (!has) {
        container.innerHTML = `<div class="small">MTProto недоступен в этом регионе</div>`;
        return;
      }

      const url = `${API_BASE}/info/connections/mtproto?id=${id}&env=${env}`;

      container.innerHTML = `<div class="small">Загрузка MTProto...</div>`;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const connections = data.connections || [];

          container.innerHTML = `
            <ul class="proxy-list">
              ${connections.map(c => `
                <li class="proxy-item" onclick="window.open('${c.url}', '_blank')">
                  <div class="proxy-label"><img src="https://cdn.simpleicons.org/telegram" /> ${c.label}</div>
                  <div class="proxy-action">Connect</div>
                </li>
              `).join("")}
            </ul>
          `;
        })
        .catch(() => {
          container.innerHTML = `<div class="small">Ошибка загрузки MTProto</div>`;
        });
    }

    function renderWireguard(id, env, has) {
      const container = document.getElementById("wg-content");

      if (!has) {
        container.innerHTML = `<div class="small">WireGuard недоступен</div>`;
        return;
      }

      const url = `${API_BASE}/info/connections/wireguard?id=${id}&env=${env}`;

      container.innerHTML = `<div class="small">Загрузка WireGuard...</div>`;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const nodes = data.nodes || [];

          container.innerHTML = `
            <ul class="proxy-list">
              ${nodes.map((n, i) => `
                <li class="proxy-item">
                  <div class="proxy-label black">
                    <img src="/Images/wireguard.svg">  ${n.label}
                    <span class="badge">WG</span>
                  </div>

                  <div style="display:flex; gap:10px;">
                    <button onclick="copyText(\`${escapeBackticks(n.config)}\`, 'Скопировано')">
                      Copy
                    </button>

                    <button onclick="downloadWG(\`${escapeBackticks(n.config)}\`, '${n.label}')">
                      Download
                    </button>
                  </div>
                </li>

                <div class="qr-item" style="margin-bottom: 16px;">
                  <span>${n.label}</span>
                  <canvas id="wg-qr-${i}"></canvas>
                </div>
              `).join("")}
            </ul>
          `;

          nodes.forEach((n, i) => {
            QRCode.toCanvas(
              document.getElementById(`wg-qr-${i}`),
              n.config,
              {width: 160}
            );
          });
        })
        .catch(() => {
          container.innerHTML = `<div class="small">Ошибка загрузки WireGuard</div>`;
        });
    }


    function downloadWG(content, name) {
      const blob = new Blob([content], {type: "text/plain"});
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = `${name}.conf`;
      a.click();

      URL.revokeObjectURL(url);
    }

    function render(data) {
      document.getElementById('sub-id').innerText = data.id;

      const daysEl = document.getElementById('days');
      const statusEl = document.getElementById('status-text');
      const expiryDate = new Date(data.expires);
      const now = new Date();
      const diffMs = expiryDate - now;
      const diffDays = diffMs / (1000 * 60 * 60 * 24);
      const fullDays = Math.floor(diffDays);

      // Логика статуса и цвета
      if (diffMs <= 0) {
        // Истекла
        statusEl.innerText = "ИСТЕКЛА";
        statusEl.className = "status-expired";
        daysEl.innerText = "0";
        daysEl.className = "days-red";
        daysEl.style.fontSize = "1.8rem";
        statusEl.style.fontSize = "1.4rem";

      } else if (diffDays < 1) {
        // Меньше дня - показываем часы:минуты:секунды
        const diffSec = Math.floor(diffMs / 1000);
        const h = Math.floor(diffSec / 3600).toString().padStart(2, '0');
        const m = Math.floor((diffSec % 3600) / 60).toString().padStart(2, '0');
        const s = (diffSec % 60).toString().padStart(2, '0');

        statusEl.innerText = "ПОЧТИ ИСТЕКЛА";
        statusEl.className = "status-warning";
        statusEl.style.fontSize = "1.4rem";
        daysEl.innerText = `${h}:${m}:${s}`;
        daysEl.className = "days-warning";
        daysEl.style.fontSize = "1.8rem";

        // Обновляем каждую секунду
        setTimeout(() => render(data), 1000);
      } else {
        // Активна
        statusEl.innerText = "АКТИВНА";
        statusEl.className = "status-active";
        statusEl.style.fontSize = "1.4rem";
        daysEl.innerText = fullDays;
        daysEl.style.fontSize = "1.8rem";

        // Цвет дней: красный если <= 3, иначе зеленый
        if (fullDays <= 3) {
          daysEl.className = "days-red";
        } else {
          daysEl.className = "days-green";
        }
      }

      // Рендер окружений
      const envContainer = document.getElementById('env-selector');
      envContainer.innerHTML = '';

      if (data.locations && data.locations.length > 0) {
        data.locations.forEach(loc => {
          const btn = document.createElement('button');
          btn.className = `tab ${loc.env === currentEnv ? 'active' : ''}`;
          btn.style.fontSize = '0.8rem';
          btn.style.padding = '5px 12px';
          btn.innerText = ENV_NAMES[loc.env] || loc.env.toUpperCase();

          btn.onclick = () => {
            currentEnv = loc.env;
            render(data);
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
          };
          envContainer.appendChild(btn);
        });
      }

      const activeLoc = data.locations?.find(l => l.env === currentEnv) || data.locations?.[0];

      document.getElementById('xray-list').innerHTML = '';
      document.getElementById('xray-qr').innerHTML = '';
      document.getElementById('h2-list').innerHTML = '';
      document.getElementById('h2-qr').innerHTML = '';

      if (activeLoc) {
        renderXray(data.id, loc.env, loc.has_xray);
        renderH2(data.id, loc.env, loc.has_h2);
        renderMtproto(data.id, loc.env, loc.has_mtproto);
        renderWireguard(data.id, loc.env, loc.has_wg);

      }

      function setupProto(proto, id, env, formats) {
        const listContainer = document.getElementById(`${proto}-list`);
        const qrContainer = document.getElementById(`${proto}-qr`);

        formats.forEach(fmt => {
          const url = `${API_BASE}/sub?id=${id}&env=${env}&proto=${proto === 'xray' ? 'Xray' : 'Hysteria2'}&format=${fmt.toLowerCase()}`;

          const item = document.createElement('div');
          item.className = 'proxy-item';
          item.innerHTML = `<div class="proxy-label">${fmt}</div><div class="proxy-action">Копировать</div>`;
          item.onclick = () => copy(url, "Ссылка скопирована");
          listContainer.appendChild(item);

          const qrBox = document.createElement('div');
          qrBox.className = 'qr-item';
          qrBox.innerHTML = `<span>${fmt}</span><canvas id="qr-${proto}-${fmt}-${env}"></canvas>`;
          qrContainer.appendChild(qrBox);

          setTimeout(() => {
            const canvas = document.getElementById(`qr-${proto}-${fmt}-${env}`);
            if (canvas) QRCode.toCanvas(canvas, url, {width: 120, margin: 1});
          }, 50);
        });
      }

      function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        el.classList.add('active');

        const tabs = ['xray', 'h2', 'wg', 'mtproto'];

        tabs.forEach(t => {
          document.getElementById(`content-${t}`).classList.toggle('hidden', t !== tab);
        });
      }
      function copy(text, message = "Скопировано") {
        navigator.clipboard.writeText(text);
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert(message);
      }

      async function activateKey() {
        const code = document.getElementById('keyInput').value;
        const subId = getSubId();

        if (!code) return;

        if (!subId) {
          tg.showAlert("Нет subscription ID");
          return;
        }

        tg.MainButton.showProgress();

        try {
          const res = await fetch(`${AUTH_BASE}/activate`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({code, subscription_id: subId})
          });

          if (!res.ok) {
            tg.HapticFeedback.notificationOccurred('error');
            tg.showAlert("Ошибка ключа");
            return;
          }

          tg.HapticFeedback.notificationOccurred('success');
          location.reload();

        } catch {
          tg.HapticFeedback.notificationOccurred('error');
          tg.showAlert("Ошибка сети");
        }

        tg.MainButton.hideProgress();
      }

      function showState(s) {
        document.getElementById('main-app').classList.toggle('hidden', s === 'error');
        document.getElementById('error-screen').classList.toggle('hidden', s !== 'error');
      }

      load();
  </script>
</body>

</html>
