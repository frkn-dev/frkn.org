<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страницы — FRKN</title>

  <style>
    body {
      margin: 0;
      background: #d7c9a3;
      font-family: 'Special Elite', monospace;
      line-height: 1.6;
      color: #1a1a1a;
    }

    .container {
      max-width: 760px;
      margin: 60px auto;
      padding: 60px 70px;
      background: #f5e9c9;
      /* страница бумаги */
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 40px;
      letter-spacing: 1px;
      text-align: center;
      text-shadow: 0 0 1px rgba(0, 0, 0, 0.15);
    }

    h2 {
      font-size: 20px;
      margin: 30px 0 10px 0;
      letter-spacing: 1px;
      text-shadow: 0 0 1px rgba(0, 0, 0, 0.1);
    }



    ul {
      list-style: none;
      padding-left: 0;
    }

    li {
      margin-bottom: 12px;
    }

    a {
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px dotted #1a1a1a;
      transition: all 0.2s;
    }

    a:hover {
      background: #1a1a1a;
      color: #f5e9c9;
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      opacity: 0.7;
      text-align: center;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">

</head>

<body>

  <div class="container">
    <h1>Страницы ФРКН</h1>

    <h2>Содержание</h2>
    <ul>
      <li><a href="/b/intro/">Введение</a></li>

    </ul>

    <div class="footer">
      FRKN · 2026
    </div>
  </div>

  <script src="/scripts/analytics.js" defer></script>

</body>

</html>
