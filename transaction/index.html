<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>frkn Privacy — Активация</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      max-width: 400px;
      width: 90%;
      padding: 40px 20px;
      text-align: center;
    }

    /* Контейнер для ключа */
    .key-container {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      gap: 12px;
    }

    .key-text {
      flex-grow: 1;
      font-family: 'SF Mono', monospace;
      font-size: 14px;
      color: #22c55e;
      /* Сделал ключ зеленым, как на скрине */
      letter-spacing: 0.5px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-icon-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 18px;
      transition: color 0.2s;
    }

    .copy-icon-btn:hover {
      color: #fff;
    }

    .btn-pay {
      background: #fff;
      color: #000;
      padding: 16px;
      border-radius: 14px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      transition: transform 0.1s;
    }

    .btn-pay:active {
      transform: scale(0.98);
    }

    #success-section {
      display: none;
    }

    .loader {
      border: 3px solid #222;
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    /* Попап ошибок — теперь фиксированный по центру */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup-content {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 24px;
      border: 1px solid #333;
      max-width: 320px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="waiting-section">
      <h1 class="hero-title" style="font-size: 24px; margin-bottom: 10px;">Проверяем платёж</h1>
      <div class="loader"></div>
      <p id="status" style="color: #666; font-size: 14px;">Обычно это занимает не больше минуты.</p>
    </div>

    <div id="success-section">
      <h2 style="color: #22c55e; font-size: 24px; margin-bottom: 10px;">Оплата принята! 🚀</h2>
      <p style="color: #888; font-size: 14px; margin-bottom: 30px;">Ваш ключ активации готов:</p>

      <label style="color: #555; font-size: 11px; text-transform: uppercase;
        letter-spacing: 1px; display: block; text-align: left; margin-bottom: 8px; margin-left: 5px;">
        Ключ Активации</label>
      <div class="key-container">
        <div class="key-text" id="subscription-key">ЗАГРУЗКА...</div>
        <button class="copy-icon-btn" onclick="copyKey()" id="copy-btn">📋</button>
      </div>

      <button class="btn-pay" id="auto-activate-btn">
        🚀 Активировать сейчас
      </button>

      <div style="color: #444; font-size: 12px; margin-top: 25px; text-align: left; line-height: 1.6;">
        <strong>Инфо:</strong><br>

        1. Нажми кнопку для мгновенной привязки.<br>
        2. Или используй ключ вручную.<br>
        3. Ключ можно подарить.<br><br>

        <a class="text-link" href="https://frkn.org/info/activation-keys/"> Что такое ключ активации? </a>
      </div>
    </div>

    <div id="error-popup" class="popup-overlay">
      <div class="popup-content">
        <div style="font-size: 40px; margin-bottom: 15px;">⚠️</div>
        <h2 style="margin: 0 0 10px 0; font-size: 20px;">Ошибка</h2>
        <p id="popup-message" style="color: #888; font-size: 14px; margin-bottom: 20px;"></p>
        <button onclick="closePopup()"
          style="background: #333; color: #fff; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; width: 100%;">Ясно</button>
      </div>
    </div>

    <div id="footer-container" style="margin-top: 40px; opacity: 0.3;"></div>
  </div>

  <script>
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const BASE = isLocal ? "http://localhost:8000" : "https://frkn.org";
    const PAYMENT_API_BASE = isLocal ? "http://localhost:8080" : "https://api.frkn.org";

    const params = new URLSearchParams(window.location.search);
    const txid = params.get("txid");

    function closePopup() {document.getElementById('error-popup').classList.remove('active');}

    function copyKey() {
      const keyText = document.getElementById('subscription-key').innerText;
      const btn = document.getElementById('copy-btn');
      navigator.clipboard.writeText(keyText).then(() => {
        btn.innerText = '✅';
        setTimeout(() => {btn.innerText = '📋';}, 2000);
      });
    }

    async function poll() {
      if (!txid) return;
      try {
        const res = await fetch(`${PAYMENT_API_BASE}/payment/check/${txid}`);
        const data = await res.json();

        if (data.code) {
          document.getElementById('waiting-section').style.display = 'none';
          document.getElementById('success-section').style.display = 'block';
          document.getElementById('subscription-key').innerText = data.code;
          document.getElementById('auto-activate-btn').onclick = () => {
            window.location.href = `${BASE}/activate?code=${data.code}`;
          };
        } else {
          setTimeout(poll, 2000);
        }
      } catch (e) {
        setTimeout(poll, 5000);
      }
    }

    if (txid) poll();
    else document.getElementById('status').innerText = "Транзакция не найдена.";
  </script>
</body>

</html>
