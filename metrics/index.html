<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRKN Metrics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

    <style>
      body {
        font-family: Inter, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
      }

      h2 {
        margin: 0 0 15px 0;
      }

      .header {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
        align-items: center;
      }

      input,
      select,
      button {
        padding: 10px;
        border-radius: 8px;
        background: #181818;
        color: white;
        border: 1px solid #2a2a2a;
        outline: none;
      }

      button {
        background: #36a2eb;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
        gap: 16px;
      }

      .card {
        background: #181818;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #2a2a2a;
        position: relative;
      }

      canvas {
        height: 240px !important;
      }

      .title {
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
      }

      .tags {
        font-size: 11px;
        opacity: 0.6;
        margin-bottom: 10px;
        word-break: break-all;
      }

      .remove {
        position: absolute;
        right: 10px;
        top: 10px;
        cursor: pointer;
        color: #ff5c5c;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <h2>FRKN Metrics</h2>

    <div class="header">
      <input id="metric" placeholder="metric (e.g. sys.heartbeat)" />

      <div id="tagsContainer">
        <div class="tag-row">
          <input class="tagKey" placeholder="tag key (e.g. hostname)" />
          <input
            class="tagValue"
            placeholder="tag value (e.g. darkmachine2.frkn.local)"
          />
          <button type="button" class="removeTag" style="background: #444">
            ✕
          </button>
        </div>
      </div>

      <button type="button" onclick="addTagRow()">+ Добавить тег</button>

      <select id="mode">
        <option value="range">range (все точки)</option>
        <option value="aggregated">aggregated (среднее)</option>
      </select>

      <select id="interval">
        <option value="600000">10 минут</option>
        <option value="3600000">1 час</option>
        <option value="86400000" selected>24 часа</option>
        <option value="604800000">7 дней</option>
      </select>

      <select id="groupBy">
        <option value="">без группировки</option>
        <option value="env">по env</option>
        <option value="hostname">по hostname</option>
        <option value="node">по нодам (node_id)</option>
      </select>

      <button onclick="addChart()">Add</button>
    </div>

    <div class="grid" id="grid"></div>

    <script>
      const WS_URL =
        location.hostname === "localhost"
          ? "ws://localhost:3000"
          : "wss://api.frkn.org";

      const grid = document.getElementById("grid");
      const charts = {};
      const sockets = {};

      function hash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          h = (h << 5) - h + str.charCodeAt(i);
          h |= 0;
        }
        return Math.abs(h);
      }

      function addTagRow() {
        const container = document.getElementById("tagsContainer");
        const div = document.createElement("div");
        div.className = "tag-row";
        div.innerHTML = `
          <input class="tagKey" placeholder="tag key" />
          <input class="tagValue" placeholder="tag value" />
          <button type="button" class="removeTag" style="background:#444;">✕</button>
        `;
        div.querySelector(".removeTag").onclick = () => div.remove();
        container.appendChild(div);
      }

      function buildTags() {
        const tags = {};
        document.querySelectorAll(".tag-row").forEach((row) => {
          const key = row.querySelector(".tagKey").value.trim();
          const val = row.querySelector(".tagValue").value.trim();
          if (key && val) tags[key] = val;
        });
        return tags;
      }

      function addChart() {
        const metric = document.getElementById("metric").value.trim();
        const mode = document.getElementById("mode").value;
        const tags = buildTags();

        if (!metric) {
          alert("metric обязателен");
          return;
        }

        const key = `${metric}|${JSON.stringify(tags)}|${mode}`;
        const id = "c-" + hash(key);

        if (charts[id]) return;

        const card = document.createElement("div");
        card.className = "card";
        card.id = "card-" + id;

        card.innerHTML = `
          <div class="remove" onclick="removeChart('${id}')">✕</div>
          <div class="title">
            <span>${metric}</span>
            <span>${mode.toUpperCase()}</span>
          </div>
          <div class="tags">${JSON.stringify(tags)}</div>
          <canvas id="${id}"></canvas>
        `;

        grid.appendChild(card);

        const ctx = document.getElementById(id).getContext("2d");

        charts[id] = new Chart(ctx, {
          type: "line",
          data: {
            datasets: [
              {
                data: [],
                borderColor: "#36a2eb",
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.25,
              },
            ],
          },
          options: {
            animation: false,
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { type: "time" },
              y: { beginAtZero: true },
            },
          },
        });

        startWS(id, metric, tags, mode);
      }

      function removeChart(id) {
        if (sockets[id]) sockets[id].close();
        if (charts[id]) charts[id].destroy();
        delete sockets[id];
        delete charts[id];
        const el = document.getElementById("card-" + id);
        if (el) el.remove();
      }

      function startWS(id, metric, tags, mode) {
        const params = new URLSearchParams();
        params.set("metric", metric);
        params.set("mode", mode);

        // Группировка, если выбрана
        const groupBy = document.getElementById("groupBy").value;
        if (groupBy) {
          params.set("group_by", groupBy);
        }

        Object.entries(tags).forEach(([k, v]) => params.set(k, v));

        const intervalMs = parseInt(document.getElementById("interval").value);
        params.set("from", (Date.now() - intervalMs).toString());

        const ws = new WebSocket(`${WS_URL}/ws/metrics?${params}`);

        ws.onmessage = (event) => {
          const chart = charts[id];
          if (!chart) return;

          let res;
          try {
            res = JSON.parse(event.data);
          } catch (e) {
            console.error("JSON parse error", e);
            return;
          }

          const type = res.type;
          if (type === "multiline") {
            // data: { "group_value1": [[ts,val],...], "group_value2": [...] }
            const groups = res.data || {};
            const newDatasets = [];
            const colorPalette = [
              "#36a2eb",
              "#ff6384",
              "#4bc0c0",
              "#ff9f40",
              "#9966ff",
              "#c9cbcf",
            ];

            let colorIndex = 0;
            for (const [groupValue, points] of Object.entries(groups)) {
              if (!points || points.length === 0) continue;
              const dataPoints = points.map(([x, y]) => ({ x, y }));
              const borderColor =
                colorPalette[colorIndex % colorPalette.length];
              newDatasets.push({
                label: groupValue,
                data: dataPoints,
                borderColor: borderColor,
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.25,
                fill: false,
              });
              colorIndex++;
            }
            chart.data.datasets = newDatasets;
            chart.update("none");
          } else if (type === "aggregated") {
            const points = (res.data || []).map(([x, y]) => ({ x, y }));
            chart.data.datasets = [
              {
                label: "aggregated",
                data: points,
                borderColor: "#36a2eb",
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.25,
                fill: false,
              },
            ];
            chart.update("none");
          } else {
            // type === "range" (одна линия)
            const points = (res.data || []).map(([x, y]) => ({ x, y }));
            chart.data.datasets = [
              {
                label: res.metric,
                data: points,
                borderColor: "#36a2eb",
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.25,
                fill: false,
              },
            ];
            chart.update("none");
          }
        };

        ws.onerror = (err) => console.error("WS error", id, err);
        ws.onclose = () => console.log("WS closed", id);
        sockets[id] = ws;
      }
    </script>
<script src="/scripts/analytics.js" defer></script>
</body>
</html>
