<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FRKN Privacy Company</title>
  <link rel="icon" href="/Images/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1 class="hero-title">Активация ключа</h1>
      <div id="logo-container"></div>
    </header>

    <section class="hero">
      <div class="card activateCard">
        <div class="small right">
          <a href="/pay" class="text-link">Купить ключ</a> |
          <a class="text-link" href="/info/activation-keys/"> Что такое ключ активации? </a>
        </div>

        <div><br><br>Введи ключ чтобы получить доступ

        </div>

        <p></p>
        <form id="activateKeyForm">
          <input type="text" id="code" name="code" placeholder="Ключ: KKKKK-LLLLL-MMMMM-NNNNN-FFFFF-X" required />

          <div class="small">

            <br> Необязательно – Мы создадим новую если не укажешь ID подписки
          </div>
          <input type="text" id="id" name="id" placeholder="ID Подписки: aaaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee" />


          <button class="btn activate" type="submit">Активировать</button>
        </form>

        <div id="message"></div>
        <div id="result" style="display:none;"></div>
      </div>
    </section>

    <div id="footer-container"></div>
  </div>
  <script src="/scripts/activate.js"></script>
  <script src="/scripts/analytics.js" defer></script>
  <script src="/scripts/containers.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const activationCode = params.get("code");

    if (activationCode) {
      const activationCodeInput = document.getElementById("code");

      if (activationCodeInput) {
        activationCodeInput.value = activationCode;
        activationCodeInput.style.borderColor = "#22c55e";

        activationCodeInput.style.boxShadow = "0 0 10px rgba(34, 197, 94, 0.2)";
      }
    }
  </script>
</body>

</html>
