<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRKN Privacy Company</title>
  <link rel="icon" href="/Images/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="container">
    <header>
      <div id="logo-container"></div>
      <div class="badge"><a href=/profile> Личный кабинет 😏</a></div>
    </header>

    <section class="hero">
      <div class="card activateCard">
        <div class="small right"> <a href="/store" class="text-link">Купить ключ</a></div>

        <h1>Активация ключа</h1>
        <div class="small">Введи ключ чтобы получить доступ <br>
          Если оставишь email мы продублируем инфу туда</div>

        <p></p>



        <form id="activateKeyForm">
          <input type="text" name="code" placeholder="XXXXX-XXXXX-XXXXX-XXXXX-XXXXX-X" required />

          <input type="email" name="email" placeholder="Email (необязательно)" /><br>

          <button class="btn activate" type="submit">Активировать</button>
        </form>

        <div id="message"></div>
        <div id="result" style="display:none;"></div>
      </div>
    </section>

    <div id="footer-container"></div>
  </div>
  <script src="/activate.js"></script>
  <script src="/analytics.js" defer></script>
  <script src="/scripts/containers.js"></script>
</body>

</html>
