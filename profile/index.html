<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Личный кабинет — FRKN Privacy Company</title>
  <link rel="icon" href="Images/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1 class="hero-title">Доступ к подписке</h1>
      <div id="logo-container"></div>

    </header>

    <section class="hero">
      <div class="hero-content">
        <div class="card trialCard">
          <form id="subscriptionForm">
            <div class="small right"> <a href="/info/subscriptions" class="text-link">
                Что такое подписка?
              </a> |

              <a href="/pay" class="text-link">
                У меня нет подписки </a>
            </div>
            <input type="text" name="id" id="sub_id" placeholder="aaaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee" required />

            <button class="btn" type="submit">
              Открыть подписку
            </button>

            <div class="small">
              Вставь свой ID, чтобы посмотреть информацию о подписке
            </div>

            <div class="message" id="subMessage"></div>



          </form>

        </div>
    </section>

    <div id="footer-container"></div>
  </div>

  <script src="/scripts/analytics.js" defer></script>
  <script src="/scripts/trial.js"></script>
  <script src="/scripts/containers.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const promo = params.get("code");

    if (promo) {
      const promoInput = document.getElementById("code");
      if (promoInput) {
        promoInput.value = promo;
        promoInput.style.borderColor = "#22c55e";
      }
    }
  </script>



  <script>
    const subForm = document.getElementById("subscriptionForm");
    const subMessage = document.getElementById("subMessage");
    if (!subForm) {
      console.error("subscriptionForm not found");
    } else {

      subForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const id = document.getElementById("sub_id").value.trim();

        if (!id) {
          subMessage.textContent = "Введите ID";
          return;
        }

        const uuidRegex =
          /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

        if (!uuidRegex.test(id)) {
          subMessage.textContent = "Некорректный ID";
          return;
        }

        subMessage.textContent = "Открываем подписку...";

        window.location.href = `/subscription?id=${id}`;
      });
    }
  </script>
</body>

</html>
